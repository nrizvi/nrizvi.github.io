<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Multiple person icons with arrows pointing to a chatbot, symbolizing AI personas">
  <rect width="320" height="200" fill="#FFFFFF"/>
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#7B0323"/>
    </marker>
  </defs>

  <!-- People -->
  <g stroke="#5a3b44" stroke-width="2.5" stroke-linejoin="round">
    <g transform="translate(44,42)" fill="#F5A0C7">
      <circle cx="0" cy="0" r="13"/>
      <path d="M-20,34 v-5 a20,20 0 0 1 40,0 v5 Z"/>
    </g>
    <g transform="translate(44,100)" fill="#F7E696">
      <circle cx="0" cy="0" r="13"/>
      <path d="M-20,34 v-5 a20,20 0 0 1 40,0 v5 Z"/>
    </g>
    <g transform="translate(44,158)" fill="#A3D8F8">
      <circle cx="0" cy="0" r="13"/>
      <path d="M-20,34 v-5 a20,20 0 0 1 40,0 v5 Z"/>
    </g>
  </g>

  <!-- Arrows toward the chatbot (flowing) -->
  <g fill="none" stroke="#7B0323" stroke-width="3" stroke-linecap="round" stroke-dasharray="9 8">
    <path d="M74,44 C112,44 132,92 174,98" marker-end="url(#ah)">
      <animate attributeName="stroke-dashoffset" values="17;0" dur="0.9s" repeatCount="indefinite"/>
    </path>
    <path d="M74,100 L174,100" marker-end="url(#ah)">
      <animate attributeName="stroke-dashoffset" values="17;0" dur="0.9s" repeatCount="indefinite"/>
    </path>
    <path d="M74,158 C112,158 132,108 174,102" marker-end="url(#ah)">
      <animate attributeName="stroke-dashoffset" values="17;0" dur="0.9s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Chatbot -->
  <g stroke="#1f3a52" stroke-width="2.5" stroke-linejoin="round">
    <line x1="234" y1="60" x2="234" y2="48" stroke-linecap="round"/>
    <circle cx="234" cy="44" r="4.5" fill="#F7E696"/>
    <rect x="188" y="60" width="94" height="88" rx="16" fill="#A3D8F8"/>
    <rect x="200" y="74" width="70" height="60" rx="10" fill="#FFFFFF"/>
    <circle cx="222" cy="98" r="6" fill="#1f3a52" stroke="none"/>
    <circle cx="248" cy="98" r="6" fill="#1f3a52" stroke="none"/>
    <path d="M220,114 q15,12 30,0" fill="none" stroke-linecap="round"/>
  </g>
</svg>
